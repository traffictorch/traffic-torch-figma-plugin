<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Torch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { margin:0; padding:20px; font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #1f2937; }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #e5e7eb; }
    }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .torch { font-size:32px; }
    h1 { margin:0; font-size:24px; font-weight:600; }
    .tab-bar { display:flex; border-bottom:2px solid #e5e7eb; margin-bottom:20px; }
    .tab { padding:8px 16px; font-weight:500; border-bottom:3px solid transparent; }
    .tab.active { border-bottom-color:#10b981; color:#10b981; }
    button { background:#10b981; color:white; border:none; padding:16px; border-radius:9999px; font-size:16px; font-weight:600; width:100%; margin-top:20px; cursor:pointer; }
    button:hover { background:#059669; }
    select, input { width:100%; padding:14px; border-radius:9999px; border:1px solid #d1d5db; margin-bottom:12px; font-size:16px; }
    .dark body { background:#111827; color:#e5e7eb; }
  </style>
</head>
<body>
  <div class="header">
    <div class="torch">🔦</div>
    <div>
      <h1>Traffic Torch</h1>
      <p style="margin:0; font-size:13px; opacity:0.7;">AI GEO & SEO Tools for Figma</p>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active">All Tools</div>
    <div class="tab">Welcome</div>
    <div class="tab">Help</div>
  </div>

  <select id="tool">
    <option value="https://traffictorch.net/local-seo-tool/">📍 Local SEO Tool</option>
    <option value="https://traffictorch.net/seo-intent-tool/">🎯 SEO Intent Tool</option>
    <option value="https://traffictorch.net/topical-authority-tool/">🧬 Topical Authority Tool</option>
  </select>

  <input id="url" type="text" placeholder="https://your-site.com" value="https://traffictorch.net">

  <button onclick="launch()">🚀 Launch Tool with URL →</button>

  <script>
    function launch() {
      const tool = document.getElementById('tool').value;
      const url = document.getElementById('url').value;
      const fullUrl = url ? tool + '?url=' + encodeURIComponent(url) : tool;
      window.parent.postMessage({ type: 'LAUNCH_TOOL', toolBase: tool, siteUrl: url }, '*');
      window.open(fullUrl, '_blank');
    }
  </script>
</body>
</html>

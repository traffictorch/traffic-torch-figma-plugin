<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Torch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { margin:0; padding:20px; font-family:'Inter',system-ui,sans-serif; background:#fff; color:#1f2937; line-height:1.5; }
    @media (prefers-color-scheme: dark) { body { background:#111827; color:#e5e7eb; } }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    h1 { margin:0; font-size:24px; font-weight:600; }
    select, input { width:100%; padding:14px; border-radius:9999px; border:1px solid #d1d5db; margin-bottom:12px; font-size:16px; }
    button { background:#10b981; color:white; border:none; padding:16px; border-radius:9999px; font-size:16px; font-weight:600; width:100%; margin:12px 0; cursor:pointer; }
    button:hover { background:#059669; }
    .card { background:#f8fafc; padding:16px; border-radius:16px; margin:16px 0; border:1px solid #e2e8f0; }
    .dark .card { background:#1f2937; border-color:#374151; }
  </style>
</head>
<body>
  <div class="header">
    <div style="font-size:32px">🚥</div>
    <div>
      <h1>Traffic Torch</h1>
      <p style="margin:0; font-size:13px; opacity:0.7;">AI GEO & SEO Tools for Figma</p>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="font-size:24px">⚜️</span>
      <strong>Topical Authority</strong>
    </div>
    <p style="font-size:13px; opacity:0.8;">Analyzes content clusters, gaps, and authority signals to help you build stronger topical relevance.</p>
  </div>

  <label style="display:block; font-size:13px; margin-bottom:6px; font-weight:500;">Select Tool</label>
  <select id="toolSelect">
    <option value="https://traffictorch.net/topical-authority-audit-tool/">⚜️ Topical Authority</option>
    <option value="https://traffictorch.net/seo-entity-extractor-tool/">🧬 Entity Extractor</option>
    <option value="https://traffictorch.net/seo-intent-tool/">🎯 SEO Intent</option>
    <option value="https://traffictorch.net/local-seo-tool/">📍 Local SEO</option>
    <option value="https://traffictorch.net/product-seo-tool/">🛒 Product SEO</option>
    <option value="https://traffictorch.net/schema-generator/">⚙️ Schema Generator</option>
    <option value="https://traffictorch.net/ai-search-optimization-tool/">🔍 AI Search Optimization</option>
    <option value="https://traffictorch.net/ai-voice-search-tool/">🎙️ AI Voice Search</option>
    <option value="https://traffictorch.net/ai-audit-tool/">🤖 AI Content</option>
    <option value="https://traffictorch.net/quit-risk-tool/">⚡ Quit Risk</option>
    <option value="https://traffictorch.net/">⚖️ SEO + UX Audit</option>
    <option value="https://traffictorch.net/keyword-research-tool/">🔑 Keyword Research</option>
    <option value="https://traffictorch.net/keyword-tool/">📝 Keyword Placement</option>
    <option value="https://traffictorch.net/keyword-vs-tool/">🆚 Competition (VS)</option>
  </select>

  <label style="display:block; font-size:13px; margin:16px 0 6px; font-weight:500;">Site URL</label>
  <input id="urlInput" type="text" value="yoursite.com" placeholder="yoursite.com">

  <button onclick="launchTool()">🚀 Launch Tool with URL →</button>

  <script>
    function launchTool() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) url = "yoursite.com";

      const toolBase = document.getElementById('toolSelect').value;
      const fullUrl = toolBase + '?url=' + encodeURIComponent(url);
      
      window.parent.postMessage({ type: 'LAUNCH_TOOL', toolBase: toolBase, siteUrl: url }, '*');
      window.open(fullUrl, '_blank');
    }
  </script>
</body>
</html>
